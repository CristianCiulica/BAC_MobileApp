name: bac_app
description: "BacPro — pregătire pentru Bacalaureat: subiecte oficiale, timer de examen, planner de studiu și progres."
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.6.12
  pdf: ^3.12.0
  pdfrx: ^2.4.2
  shared_preferences: ^2.5.3
  flutter_local_notifications: ^21.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/pdfs/
    - assets/images/
    - assets/subiecte/
    - assets/subiecte/matematica/
    - assets/subiecte/informatica/
    - assets/subiecte/romana/
    - assets/subiecte/istorie/
    - assets/subiecte/biologie/
    - assets/subiecte/chimie/
    - assets/subiecte/fizica/
    - assets/subiecte/geografie/
    - assets/subiecte/logica/
    - assets/subiecte/psihologie/
    - assets/subiecte/economie/
    - assets/subiecte/sociologie/
    - assets/subiecte/filosofie/
